name: SBOM Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Node dependencies
        run: npm install --package-lock-only && npm ci
        # This creates node_modules/ so Syft and Grype can see the packages

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o spdx-json=sbom.json
          echo "Total packages found:"
          cat sbom.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(len(d.get('packages',[])))
          "

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan SBOM for vulnerabilities
        run: |
          grype sbom:sbom.json -o json > grype-results.json
          echo "Final vulnerability summary:"
          cat grype-results.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          matches=d.get('matches',[])
          from collections import Counter
          counts=Counter(m['vulnerability']['severity'] for m in matches)
          for sev in ['Critical','High','Medium','Low','Negligible']:
            print(f'  {sev}: {counts.get(sev,0)}')
          print(f'  Total: {len(matches)}')
          "

      - name: Run Claude triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 triage.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Upload Grype results artifact
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: grype-results.json